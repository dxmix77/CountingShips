<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Gulf Map</title>

<style>

/* ---------------------------------------------------------
   🔥 FULL CSS RESET — Ακυρώνει ΟΛΟ το CSS του GitHub Pages
---------------------------------------------------------- */
html, body {
    margin: 0 !important;
    padding: 0 !important;
    width: 100% !important;
    height: auto !important;
    max-width: 100% !important;
    overflow-x: hidden !important;
    background: #000 !important;
}

img {
    margin: 0 !important;
    padding: 0 !important;
    display: block !important;
    max-width: 100% !important;
    height: auto !important;
    box-sizing: content-box !important;
}

/* ---------------------------------------------------------
   📌 Container της εικόνας
---------------------------------------------------------- */
#image-container {
    position: relative;
    width: 100%;
    height: auto;
    display: block;
}

/* ---------------------------------------------------------
   📌 Responsive εικόνα
---------------------------------------------------------- */
#bg-image {
    width: 100%;
    height: auto;
    display: block;
}

/* ---------------------------------------------------------
   📌 Hotspots (αόρατα, με μαύρο hover)
---------------------------------------------------------- */
.hotspot {
    position: absolute;
    border-radius: 50%;
    background-color: rgba(0,0,0,0);
    cursor: pointer;
    transform: translate(-50%, -50%);
    transition: background-color 0.2s ease;
}

.hotspot:hover {
    background-color: rgba(0,0,0,0.4);
}

/* ---------------------------------------------------------
   📌 Hamburger icon
---------------------------------------------------------- */
#menu-icon {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 32px;
    color: white;
    cursor: pointer;
    z-index: 9999;
    user-select: none;
}

</style>
</head>

<body>

<div id="menu-icon">≡</div>

<div id="image-container">
    <img id="bg-image" src="gulf.png" alt="Gulf Map">
</div>

<script>
    const ORIGINAL_WIDTH = 1047;
    const ORIGINAL_HEIGHT = 689;

    // Hotspot size: 17px at full resolution → convert to vw units
    const HOTSPOT_SIZE_PX = 17;
    const HOTSPOT_SIZE_VW = (HOTSPOT_SIZE_PX / ORIGINAL_WIDTH) * 100;

    // Φόρτωμα του pixel_coordinates.txt
    fetch("pixel_coordinates.txt")
        .then(response => response.text())
        .then(text => {
            const lines = text.trim().split("\n");
            const entries = lines.slice(1); // skip header

            entries.forEach(line => {
                const [url, xStr, yStr] = line.split(/\t+/);
                const x = parseFloat(xStr);
                const y = parseFloat(yStr);

                createHotspot(url, x, y);
            });
        });

    function createHotspot(url, x, y) {
        const container = document.getElementById("image-container");

        const hotspot = document.createElement("div");
        hotspot.className = "hotspot";

        // Αναλογική τοποθέτηση
        const leftPercent = (x / ORIGINAL_WIDTH) * 100;
        const topPercent = (y / ORIGINAL_HEIGHT) * 100;

        hotspot.style.left = leftPercent + "%";
        hotspot.style.top = topPercent + "%";

        // Αναλογικό μέγεθος hotspot
        hotspot.style.width = HOTSPOT_SIZE_VW + "vw";
        hotspot.style.height = HOTSPOT_SIZE_VW + "vw";

        hotspot.onclick = () => {
            window.location.href = url; // ίδιο tab
        };

        container.appendChild(hotspot);
    }
</script>
<script>
(function() {
    // Αν ο χρήστης έχει ήδη μετρηθεί σε αυτό το session, σταμάτα
    if (sessionStorage.getItem("visitCounted")) {
        return;
    }

    // Κάνε trigger το GitHub Action (χωρίς token)
    fetch("https://api.github.com/repos/dxmix77/UnderWay/actions/workflows/trigger.yml/dispatches", {
        method: "POST",
        headers: {
            "Accept": "application/vnd.github+json",
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            ref: "main"
        })
    });

    // Σημείωσε ότι ο χρήστης μετρήθηκε
    sessionStorage.setItem("visitCounted", "true");
})();
</script>   
<script>
// ------------------------------
// 1. Bot Filtering
// ------------------------------
const botPatterns = [
  /bot/i, /crawler/i, /spider/i, /crawling/i,
  /facebookexternalhit/i, /WhatsApp/i, /Slackbot/i,
  /curl/i, /python-requests/i, /wget/i,
  /github-pages-health-check/i
];

const ua = navigator.userAgent || "";
if (botPatterns.some(pattern => pattern.test(ua))) {
  console.log("Bot detected — analytics skipped");
  return;
}

// ------------------------------
// 2. Fingerprint Generation
// ------------------------------
function generateFingerprint() {
  const existing = localStorage.getItem("visitor_fingerprint");
  if (existing) return existing;

  const seed = Math.random().toString(36).substring(2);
  const fpSource = [
    navigator.userAgent,
    screen.width + "x" + screen.height,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    navigator.language,
    seed
  ].join("||");

  const hash = btoa(fpSource).replace(/=/g, "");
  localStorage.setItem("visitor_fingerprint", hash);
  return hash;
}

const fingerprint = generateFingerprint();

// ------------------------------
// 3. Prepare Payload
// ------------------------------
const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD

const payload = {
  event_type: "analytics_event",
  client_payload: {
    fingerprint: fingerprint,
    date: today
  }
};

// ------------------------------
// 4. Send to GitHub Dispatch
// ------------------------------
fetch("https://api.github.com/repos/dxmix77/UnderWay/dispatches", {
  method: "POST",
  headers: {
    "Accept": "application/vnd.github+json",
    // No token here — token stays in workflow only
  },
  body: JSON.stringify(payload)
})
.then(() => console.log("Analytics event sent"))
.catch(() => console.log("Analytics event failed"));
</script>

</body>
</html>
