name: Queue Visit Events

on:
  repository_dispatch:
    types: [increment_visit]

jobs:
  queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Increment pending counter
        run: |
          # Αν δεν υπάρχει το προσωρινό αρχείο, ξεκίνα από το 0
          if [ ! -f pending_visits.txt ]; then
            echo 0 > pending_visits.txt
          fi

          # Διάβασε το τρέχον pending count
          PENDING=$(cat pending_visits.txt)

          # Αύξησέ το κατά 1
          echo $((PENDING + 1)) > pending_visits.txt

      - name: Commit pending counter
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add pending_visits.txt
          git commit -m "Queued visit event"
          git push
